<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darkroom — AI Image Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1b1a17;
    --panel:#232019;
    --panel-line:#3a352a;
    --amber:#e8a33d;
    --sage:#6b8f71;
    --text:#ede6d6;
    --muted:#8a8578;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:48px 24px 80px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--panel-line);
    padding-bottom:20px;
    margin-bottom:36px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:2.4rem;
    margin:0;
    letter-spacing:-0.01em;
  }
  h1 span{color:var(--amber);}
  .tagline{
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .studio{
    display:grid;
    grid-template-columns:340px 1fr;
    gap:28px;
  }
  @media (max-width:820px){ .studio{grid-template-columns:1fr;} }

  .panel{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:4px;
    padding:24px;
  }
  .field{margin-bottom:20px;}
  .field label{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--muted);
    margin-bottom:8px;
  }
  textarea, select, input[type=number]{
    width:100%;
    background:#151310;
    border:1px solid var(--panel-line);
    color:var(--text);
    border-radius:3px;
    padding:10px 12px;
    font-family:'Inter',sans-serif;
    font-size:0.92rem;
  }
  textarea{resize:vertical; min-height:88px;}
  textarea:focus, select:focus, input:focus{
    outline:none;
    border-color:var(--amber);
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .checks{display:flex; gap:18px; flex-wrap:wrap; margin-bottom:22px;}
  .check{
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.75rem;
    color:var(--muted);
  }
  .check input{accent-color:var(--amber);}

  button#generate{
    width:100%;
    background:var(--amber);
    color:#1b1a17;
    border:none;
    border-radius:3px;
    padding:13px;
    font-family:'JetBrains Mono',monospace;
    font-weight:500;
    font-size:0.85rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    cursor:pointer;
    transition:filter 0.15s ease;
  }
  button#generate:hover{filter:brightness(1.08);}
  button#generate:disabled{
    background:var(--panel-line);
    color:var(--muted);
    cursor:not-allowed;
  }

  .viewport{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:4px;
    min-height:520px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }
  .viewport img{
    max-width:100%;
    max-height:600px;
    border-radius:2px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .placeholder{
    text-align:center;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:0.8rem;
  }
  .placeholder .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--sage); display:inline-block; margin-right:8px;
  }
  .status{
    font-family:'JetBrains Mono',monospace;
    font-size:0.75rem;
    color:var(--amber);
  }
  .status.error{color:#d9705a;}

  .readout{
    margin-top:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    padding-top:14px;
    border-top:1px solid var(--panel-line);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Dark<span>room</span></h1>
      <div class="tagline">Prompt in — print out</div>
    </div>
  </header>

  <div class="studio">
    <!-- Control panel -->
    <div class="panel">
      <div class="field">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="A cinematic shot of a futuristic greenhouse laboratory, cyberpunk lighting...">A highly detailed, cinematic digital rendering of a futuristic laboratory inside a greenhouse, cyberpunk elements</textarea>
      </div>

      <div class="field">
        <label for="model">Model</label>
        <select id="model">
          {% for m in models %}
          <option value="{{ m }}" {% if m == 'flux' %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="row2">
        <div class="field">
          <label for="ratio">Aspect Ratio</label>
          <select id="ratio">
            <option value="1:1">1:1 Square</option>
            <option value="16:9" selected>16:9 Landscape</option>
            <option value="9:16">9:16 Portrait</option>
            <option value="4:3">4:3 Classic</option>
          </select>
        </div>
        <div class="field">
          <label for="resolution">Resolution</label>
          <select id="resolution">
            <option value="standard" selected>Standard (768p)</option>
            <option value="high">High (1024p)</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="seed">Seed (-1 = random)</label>
        <input type="number" id="seed" value="-1">
      </div>

      <div class="checks">
        <label class="check"><input type="checkbox" id="enhance"> Enhance prompt</label>
        <label class="check"><input type="checkbox" id="nologo" checked> No watermark</label>
        <label class="check"><input type="checkbox" id="private" checked> Private</label>
      </div>

      <button id="generate">Generate Image</button>
    </div>

    <!-- Output viewport -->
    <div class="panel viewport" id="viewport">
      <div class="placeholder" id="placeholder"><span class="dot"></span>Awaiting exposure...</div>
    </div>
  </div>
</div>

<script>
const generateBtn = document.getElementById('generate');
const viewport = document.getElementById('viewport');

function setStatus(text, isError = false) {
  viewport.innerHTML = `<div class="status${isError ? ' error' : ''}">${text}</div>`;
}

generateBtn.addEventListener('click', async () => {
  const payload = {
    prompt: document.getElementById('prompt').value,
    model: document.getElementById('model').value,
    aspect_ratio: document.getElementById('ratio').value,
    resolution_scale: document.getElementById('resolution').value,
    seed: parseInt(document.getElementById('seed').value || '-1', 10),
    enhance: document.getElementById('enhance').checked,
    nologo: document.getElementById('nologo').checked,
    private: document.getElementById('private').checked,
  };

  generateBtn.disabled = true;
  generateBtn.textContent = 'Developing...';
  setStatus('Sending prompt to the lab...');

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (!res.ok) {
      setStatus(data.error || 'Generation failed.', true);
      return;
    }

    viewport.innerHTML = `
      <div>
        <img src="${data.image}" alt="${payload.prompt}">
        <div class="readout">
          <span>seed: ${payload.seed === -1 ? 'random' : payload.seed}</span>
          <span>${payload.aspect_ratio} · ${payload.resolution_scale}</span>
          <span>${payload.model}</span>
        </div>
      </div>`;
  } catch (err) {
    setStatus('Network error: ' + err.message, true);
  } finally {
    generateBtn.disabled = false;
    generateBtn.textContent = 'Generate Image';
  }
});
</script>
</body>
</html>
